name: Daily Sync and Push

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run Build
        run: pnpm run build
        
      - name: Checkout Target Repository
        uses: actions/checkout@v3
        with:
          repository: skyskins/skyskins.github.io
          path: target-repo
          token: ${{ secrets.PAT_TOKEN }}

      - name: Copy Built Assets to Target Repo
        run: |
          rm -rf target-repo/public/assets/pets
          mkdir -p target-repo/public/assets/
          cp -r dist/public/assets/* target-repo/public/assets/

      - name: Commit and Push Changes to Frontend
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/assets/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated Sync: Update pet textures and data [skip ci]"
            git push
            echo "Successfully deployed new changes!"
          fi
